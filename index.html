<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIP IT — Apps</title>
  <meta name="description" content="iOS apps crafted by SHIP IT. Thoughtfully designed tools for property managers and hospitality professionals.">
  <meta name="theme-color" content="#f6f5f1">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/icons/zen24.png" type="image/png">
</head>
<body>

  <nav class="nav animate-in">
    <div class="container">
      <div class="nav__inner">
        <span class="nav__brand">SHIP IT</span>
      </div>
    </div>
  </nav>

  <header class="home-hero">
    <div class="container">
      <span class="home-hero__label animate-in animate-in-delay-1">iOS Apps Portfolio</span>
      <h1 class="display-xl home-hero__title animate-in animate-in-delay-2">Our Apps</h1>
      <p class="home-hero__subtitle animate-in animate-in-delay-3">
        Thoughtfully crafted tools for property managers and hospitality professionals.
      </p>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="app-grid">

        <a href="zen24/" class="app-card animate-in animate-in-delay-4">
          <img src="assets/icons/zen24.png" alt="Zen24 app icon" class="app-card__icon">
          <div class="app-card__info">
            <h2 class="app-card__name">Zen24</h2>
            <p class="app-card__tagline">Manage your Beds24 properties from your iPhone</p>
          </div>
        </a>

        <!-- To add a new app, copy this template:
        <a href="appname/" class="app-card animate-in">
          <img src="assets/icons/appname.png" alt="App Name icon" class="app-card__icon">
          <div class="app-card__info">
            <h2 class="app-card__name">App Name</h2>
            <p class="app-card__tagline">Short description of the app</p>
          </div>
        </a>
        -->

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">&copy; 2026 <a href="mailto:contact@shipit.group">SHIP IT</a>. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
