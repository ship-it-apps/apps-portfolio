<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{APP_NAME}} — Support</title>
  <meta name="description" content="Get help with {{APP_NAME}}. Find answers to common questions or contact our support team.">
  <meta name="theme-color" content="#f6f5f1">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../assets/icons/{{APP_SLUG}}.png" type="image/png">
</head>
<body>

  <nav class="nav animate-in">
    <div class="container">
      <div class="nav__inner">
        <a href="./" class="nav__back">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
          {{APP_NAME}}
        </a>
        <a href="../" class="nav__brand">SHIP IT</a>
      </div>
    </div>
  </nav>

  <header class="support-hero">
    <div class="container container--narrow">
      <img src="../assets/icons/{{APP_SLUG}}.png" alt="{{APP_NAME}} app icon" class="support-hero__icon animate-in">
      <h1 class="display-lg animate-in animate-in-delay-1">Support</h1>
      <p class="text-soft text-lg animate-in animate-in-delay-2">Find answers to common questions below.</p>
    </div>
  </header>

  <section class="faq-section">
    <div class="container container--narrow">
      <div class="faq-section__header animate-in">
        <div class="divider"></div>
        <h2 class="display-md">Frequently Asked Questions</h2>
      </div>
      <div class="faq-list">
        <!-- TODO: Add FAQ items
        <details class="faq-item">
          <summary>Question here?</summary>
          <div class="faq-item__body"><p>Answer here.</p></div>
        </details>
        -->
      </div>
    </div>
  </section>

  <section class="contact-section">
    <div class="container">
      <div class="contact-card animate-in">
        <h2 class="contact-card__title">Still need help?</h2>
        <p class="contact-card__desc">Our team is happy to assist you. Reach out and we'll get back to you as soon as possible.</p>
        <a href="mailto:contact@shipit.group" class="contact-card__email">
          ✉ contact@shipit.group
        </a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">&copy; 2026 <a href="mailto:contact@shipit.group">SHIP IT</a>. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
