<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{APP_NAME}} — {{APP_TAGLINE}}</title>
  <meta name="description" content="{{APP_DESCRIPTION}}">
  <meta name="theme-color" content="#f6f5f1">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../assets/icons/{{APP_SLUG}}.png" type="image/png">
</head>
<body>

  <nav class="nav animate-in">
    <div class="container">
      <div class="nav__inner">
        <a href="../" class="nav__back">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
          All Apps
        </a>
        <span class="nav__brand">{{APP_NAME}}</span>
      </div>
    </div>
  </nav>

  <header class="app-hero">
    <div class="container container--narrow">
      <img src="../assets/icons/{{APP_SLUG}}.png" alt="{{APP_NAME}} app icon" class="app-hero__icon animate-in">
      <h1 class="display-lg app-hero__name animate-in animate-in-delay-1">{{APP_NAME}}</h1>
      <p class="app-hero__tagline animate-in animate-in-delay-2">{{APP_TAGLINE}}</p>
      <a href="{{APP_STORE_URL}}" class="app-hero__badge animate-in animate-in-delay-3" target="_blank" rel="noopener noreferrer" aria-label="Download on the App Store">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="156" height="52">
          <rect width="120" height="40" rx="6" fill="#000"/>
          <text x="42.5" y="12.5" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif" font-size="5.2" letter-spacing="0.02em">Download on the</text>
          <text x="42.5" y="24.5" fill="#fff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="11" font-weight="600" letter-spacing="-0.01em">App Store</text>
          <g transform="translate(11, 5.5)" fill="#fff">
            <path d="M18.87 14.48a5.22 5.22 0 0 1 2.49-4.38 5.35 5.35 0 0 0-4.21-2.28c-1.77-.19-3.49 1.06-4.39 1.06-.92 0-2.31-1.04-3.81-1.01a5.61 5.61 0 0 0-4.72 2.88c-2.04 3.52-.52 8.7 1.43 11.56.98 1.4 2.12 2.97 3.63 2.91 1.47-.06 2.02-.93 3.79-.93 1.76 0 2.27.93 3.8.9 1.57-.03 2.56-1.41 3.5-2.82a11.6 11.6 0 0 0 1.6-3.25 5.04 5.04 0 0 1-3.1-4.64ZM16.03 5.96A5.12 5.12 0 0 0 17.2 2.3a5.21 5.21 0 0 0-3.37 1.74 4.88 4.88 0 0 0-1.2 3.54 4.32 4.32 0 0 0 3.4-1.62Z"/>
          </g>
        </svg>
      </a>
    </div>
  </header>

  <!-- TODO: Add features section -->
  <section class="features">
    <div class="container">
      <div class="features__header animate-in">
        <div class="divider"></div>
        <h2 class="display-md">Everything you need</h2>
      </div>
      <div class="features__grid">
        <!-- TODO: Add feature cards -->
      </div>
    </div>
  </section>

  <!-- TODO: Add info bar -->

  <section class="links-section" style="padding-top: var(--space-2xl);">
    <div class="container container--narrow">
      <div class="links-section__header animate-in">
        <div class="divider"></div>
        <h2 class="display-md">Resources</h2>
      </div>
      <div class="links-grid">
        <a href="support.html" class="link-card">
          <span class="link-card__icon">🛟</span>
          <span class="link-card__text">Support &amp; FAQ</span>
          <span class="link-card__arrow">→</span>
        </a>
        <!-- TODO: Add privacy/legal link -->
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer__text">&copy; 2026 <a href="mailto:contact@shipit.group">SHIP IT</a>. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
